<div class="login-wrapper">

  <!-- LEFT SIDE -->
  <div class="left-panel">

    <div class="content">

      <div class="logo-box">
        <i class="bi bi-google"></i>
      </div>

      <h1>Google Workspace Authentication</h1>

      <p>
        Secure enterprise authentication for modern organizations.
      </p>

      <div class="feature-list">

        <div class="feature-item">
          <i class="bi bi-shield-check"></i>
          <span>Secure Authentication</span>
        </div>

        <div class="feature-item">
          <i class="bi bi-cloud-check"></i>
          <span>Cloud Identity Access</span>
        </div>

        <div class="feature-item">
          <i class="bi bi-person-workspace"></i>
          <span>Enterprise Workspace Access</span>
        </div>

      </div>

    </div>

  </div>

  <!-- RIGHT PANEL -->

  <div class="right-panel">

    <div class="login-card">

      <div class="user-icon">
        <i class="bi bi-person-circle"></i>
      </div>

      <h2>Welcome Back</h2>

      <p class="subtitle">
        Sign in to continue
      </p>

      <!-- Email -->

      <div class="form-group">

        <label>Email</label>

        <div class="input-box">

          <i class="bi bi-envelope"></i>

          <input
            type="text"
            placeholder="Enter email"
            [(ngModel)]="username">

        </div>

      </div>

      <!-- Password -->

      <div class="form-group">

        <label>Password</label>

        <div class="input-box">

          <i class="bi bi-lock"></i>

          <input
            type="password"
            placeholder="Enter password"
            [(ngModel)]="password">

        </div>

      </div>

      <div class="options">

        <div class="remember">

          <input type="checkbox">

          <span>Remember me</span>

        </div>

        <a href="#">
          Forgot Password?
        </a>

      </div>

      <!-- LOGIN BUTTON -->

      <button class="login-btn" (click)="login()">

        <i class="bi bi-box-arrow-in-right"></i>

        Login

      </button>

      <!-- DIVIDER -->

      <div class="divider">
        <span>OR</span>
      </div>

      <!-- GOOGLE BUTTON -->

      <button class="google-btn">

        <i class="bi bi-google"></i>

        Sign in with Google

      </button>

    </div>

  </div>

</div>
