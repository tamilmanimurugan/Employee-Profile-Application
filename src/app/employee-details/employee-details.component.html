<div class="container py-5">

  <div class="card border-0 shadow-lg rounded-4 p-5">

    <div class="text-center">

      <img
        [src]="employee?.image"
        class="rounded-circle shadow"
        width="140">

      <h2 class="fw-bold mt-3">
        {{ employee?.name }}
      </h2>

      <p class="text-muted">
        {{ employee?.role }}
      </p>

    </div>

    <div class="row mt-5 g-4">

      <div class="col-md-6">

        <div class="detail-card">

          <h6>Email</h6>

          <p>{{ employee?.email }}</p>

        </div>

      </div>

      <div class="col-md-6">

        <div class="detail-card">

          <h6>Department</h6>

          <p>{{ employee?.department }}</p>

        </div>

      </div>

      <div class="col-md-6">

        <div class="detail-card">

          <h6>Status</h6>

          <p>{{ employee?.status }}</p>

        </div>

      </div>

      <div class="col-md-6">

        <div class="detail-card">

          <h6>Performance</h6>

          <p>{{ employee?.performance }}%</p>

        </div>

      </div>

    </div>

  </div>

</div>
