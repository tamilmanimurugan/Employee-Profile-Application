<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- LOGO -->
    <div class="logo-section">
      <div class="logo-box">
        <i class="bi bi-buildings-fill"></i>
      </div>

      <div>
        <h3 class="mb-0">EmployeeX</h3>
        <small>Enterprise Portal</small>
      </div>
    </div>

    <!-- PROFILE -->
    <div class="profile-box">

      <img src="https://i.pravatar.cc/200?img=12" alt="profile">

      <h5 class="mt-3 mb-1">
        Tamilmani
      </h5>

      <p>
        Senior Angular Developer
      </p>

    </div>

    <!-- MENU -->
    <ul class="sidebar-menu">

      <li>
        <a routerLink="/profile" routerLinkActive="active-link">

          <i class="bi bi-person-fill"></i>
          Profile

        </a>
      </li>

      <li>
        <a routerLink="/dashboard" routerLinkActive="active-link">

          <i class="bi bi-grid-1x2-fill"></i>
          Dashboard

        </a>
      </li>

      <li>
        <a routerLink="/employees" routerLinkActive="active-link">

          <i class="bi bi-people"></i>
          Employees

        </a>

      </li>

      <li>
        <a routerLink="/attendance" routerLinkActive="active-link">

          <i class="bi bi-calendar-check"></i>

          Attendance

        </a>
      </li>

      <li>
        <a routerLink="/settings" routerLinkActive="active-link">

          <i class="bi bi-gear-fill"></i>

          Settings

        </a>
      </li>
     
      <li>
       <a routerLink="/contact">
  <i class="bi bi-envelope-fill"></i>
  contact us
</a>
      </li>
      

    </ul>
    <button class="theme-btn" (click)="toggleTheme()">

      <i class="bi" [class.bi-moon-fill]="!darkMode" [class.bi-sun-fill]="darkMode">
      </i>

    </button>
    <!-- LOGOUT -->
    <button class="logout-btn" (click)="logout()">

      <i class="bi bi-box-arrow-right"></i>

      Logout

    </button>

  </aside>

  <!-- MAIN -->
  <div class="main-content">

    <!-- TOPBAR -->
    <header class="topbar">

      <div class="left-section">

        <h2 class="logo-text">
          Employee Portal
        </h2>

        <p class="welcome-text">
          Welcome back, Tamilmani
        </p>

      </div>

      <div class="top-right">
         <!-- <button class="theme-btn" (click)="toggleTheme()">

      <i class="bi" [class.bi-moon-fill]="!darkMode" [class.bi-sun-fill]="darkMode">
      </i>

    </button> -->

        <!-- <div class="search-box">
          <i class="bi bi-search"></i>

          <input type="text" placeholder="Search employees...">
        </div> -->

        <button class="notification-btn">
          <i class="bi bi-bell-fill"></i>
        </button>
        <img src="https://i.pravatar.cc/100?img=12" class="profile-img">

      </div>

    </header>

    <!-- PAGE -->
    <div class="page-content">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>
